[pytest]
# Diretório onde o pytest procura testes
testpaths = tests

# Adiciona a raiz do projeto ao sys.path para imports funcionarem
pythonpath = .

# Opções padrão para cada execução
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Filtragem de warnings para saída limpa
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
    ignore::UserWarning

# Marcadores customizados (evita aviso de marcador desconhecido)
markers =
    slow: testes que demoram mais (ex: integração pesada)
    unit: testes unitários isolados
